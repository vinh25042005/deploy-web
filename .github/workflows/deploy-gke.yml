name: Deploy to K8s (AWS)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io/vinh25042005/deploy-web

jobs:
  # ─── Verify cosign signatures before deploy ──────────
  verify-signatures:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify backend signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/backend:latest" \
            || (echo "❌ Backend image NOT signed — rejecting deploy!" && exit 1)

      - name: Verify frontend signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/frontend:latest" \
            || (echo "❌ Frontend image NOT signed — rejecting deploy!" && exit 1)

  # ─── Deploy to K8s ───────────────────────────────────
  deploy-k8s:
    needs: verify-signatures
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH and Kubeconfig
        run: |
          mkdir -p ~/.kube
          # Lấy kubeconfig từ AWS SSM Parameter Store
          aws ssm get-parameter --region ap-southeast-1 \
            --name /k8s/kubeconfig --query Parameter.Value --output text | \
            base64 -d | gzip -d > ~/.kube/config
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1

      - name: Deploy Backend
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Deploying backend sha-${SHA}"
          kubectl set image deployment/backend backend=$REGISTRY/backend:sha-${SHA} -n techshop
          kubectl rollout status deployment/backend -n techshop --timeout=120s

      - name: Deploy Frontend
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Deploying frontend sha-${SHA}"
          kubectl set image deployment/frontend frontend=$REGISTRY/frontend:sha-${SHA} -n techshop
          kubectl rollout status deployment/frontend -n techshop --timeout=120s
          kubectl rollout restart deployment/frontend -n techshop