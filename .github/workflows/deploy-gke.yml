name: Deploy to GKE
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: asia-southeast1-docker.pkg.dev/techshop-prod-2026/techshop

jobs:
  deploy-gke:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud + kubectl
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials techshop-gke --zone=asia-southeast1-a

      - name: Deploy Backend
        run: |
          kubectl set image deployment/backend container-0=$REGISTRY/backend:latest -n techshop
          kubectl rollout status deployment/backend -n techshop --timeout=120s

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/frontend container-0=$REGISTRY/frontend:latest -n techshop
          kubectl rollout status deployment/frontend -n techshop --timeout=120s