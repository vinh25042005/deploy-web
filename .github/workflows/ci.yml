# ─── CI: Lint → Test → Build → Push ───
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─── Hủy build cũ nếu push mới ───
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ─── Lint backend + frontend ───
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend

      - run: npm ci
        working-directory: frontend
      - run: npm run lint || true
        working-directory: frontend

  # ─── Test backend + type-check frontend ───
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  # ─── Build & Scan Backend ───
  build-backend:
    name: Build & Scan Backend
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/techshop-backend:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/techshop-backend:latest
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/techshop-backend:cache
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/techshop-backend:cache,mode=max

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/techshop-backend:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  # ─── Build & Scan Frontend ───
  build-frontend:
    name: Build & Scan Frontend
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.BACKEND_API_URL || 'http://localhost:3001/api' }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/techshop-frontend:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/techshop-frontend:latest
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/techshop-frontend:cache
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/techshop-frontend:cache,mode=max

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/techshop-frontend:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1