# ─── CI: Lint → Test → Build → Push (GHCR) ───
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─── Hủy build cũ nếu push mới ───
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write       # cosign keyless signing
  actions: read
  attestations: write
  security-events: write # upload trivy SARIF

env:
  REGISTRY: ghcr.io/vinh25042005/deploy-web

jobs:
  # ─── Lint backend + frontend ───
  lint:
    name: "Lint (Node ${{ matrix.node }})"
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        os: [ubuntu-22.04, ubuntu-24.04]
        
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend

      - run: npm ci
        working-directory: frontend
      - run: npm run lint || true
        working-directory: frontend

  # ─── Test backend + type-check frontend ───
  test:
    name: "Test (Node ${{ matrix.node }})"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        os: [ubuntu-22.04, ubuntu-24.04]
        
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  # ─── Build & Scan Backend ───
  build-backend:
    name: Build & Scan Backend
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/backend:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/backend:cache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/backend:cache,mode=max

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/backend:latest
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/backend:sha-${{ github.sha }}
          format: spdx-json
          output-file: sbom-backend.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: sbom-backend.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign backend image (keyless via GitHub OIDC)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/backend@${{ steps.build.outputs.digest }}"

      - name: Verify backend signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@${{ github.ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/backend:sha-${{ github.sha }}"

  # ─── Build & Scan Frontend ───
  build-frontend:
    name: Build & Scan Frontend
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            BACKEND_INTERNAL_URL=${{ vars.BACKEND_INTERNAL_URL || 'http://backend:3001' }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/frontend:cache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/frontend:cache,mode=max

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/frontend:sha-${{ github.sha }}
          format: spdx-json
          output-file: sbom-frontend.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-frontend
          path: sbom-frontend.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign frontend image (keyless via GitHub OIDC)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/frontend@${{ steps.build.outputs.digest }}"

      - name: Verify frontend signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@${{ github.ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/frontend:sha-${{ github.sha }}"