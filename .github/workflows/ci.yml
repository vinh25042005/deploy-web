# ─── CI: Lint → Test → Build → Push ───
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─── Hủy build cũ nếu push mới ───
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID || 'techshop-prod-2026' }}/techshop

jobs:
  # ─── Lint backend + frontend ───
  lint:
    name: "Lint (Node ${{ matrix.node }})"
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        os: [ubuntu-22.04, ubuntu-24.04]
        
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend

      - run: npm ci
        working-directory: frontend
      - run: npm run lint || true
        working-directory: frontend

  # ─── Test backend + type-check frontend ───
  test:
    name: "Test (Node ${{ matrix.node }})"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        os: [ubuntu-22.04, ubuntu-24.04]
        
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  # ─── Build & Scan Backend ───
  build-backend:
    name: Build & Scan Backend
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker auth
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/backend:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/backend:cache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/backend:cache,mode=max

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/backend:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  # ─── Build & Scan Frontend ───
  build-frontend:
    name: Build & Scan Frontend
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker auth
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.BACKEND_API_URL || 'http://localhost:3001/api' }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/frontend:cache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/frontend:cache,mode=max

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/frontend:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1