# ─── Deploy: Staging + Production ───
name: Deploy to GCP
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: asia-southeast1-docker.pkg.dev/techshop-prod-2026/techshop
  BACKEND_IP: ${{ vars.BACKEND_IP || '34.142.170.90' }}
  FRONTEND_IP: ${{ vars.FRONTEND_IP || '34.87.84.121' }}
  DB_INTERNAL_IP: ${{ vars.DB_INTERNAL_IP || '10.148.0.3' }}

jobs:
  # ─── Staging (auto khi push main) ───
  deploy-staging:
    name: Deploy to Staging
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.ref_type == 'branch' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend
        run: |
          gcloud compute ssh deploy@shop-backend --zone=asia-southeast1-a \
            --command="
              docker rm -f backend 2>/dev/null;
              for i in {1..3}; do
                docker pull $REGISTRY/techshop-backend:latest && break;
                echo 'Retry pull... (\$i/3)';
                sleep 3;
              done &&
              docker run -d --name backend --restart always -p 3001:3001 \
                -e DATABASE_URL=\"postgresql://postgres:postgres@$DB_INTERNAL_IP:5432/shopdb?schema=public\" \
                -e JWT_SECRET=\"${{ secrets.JWT_SECRET }}\" \
                -e JWT_EXPIRES_IN=7d \
                -e PORT=3001 \
                -e NODE_ENV=staging \
                -e FRONTEND_URL=http://$FRONTEND_IP:3000 \
                $REGISTRY/techshop-backend:latest
            "

      - name: Deploy Frontend
        run: |
          gcloud compute ssh deploy@shop-frontend --zone=asia-southeast1-a \
            --command="
              docker rm -f frontend 2>/dev/null;
              docker pull $REGISTRY/techshop-frontend:latest &&
              docker run -d --name frontend --restart always -p 3000:3000 \
                $REGISTRY/techshop-frontend:latest
            "

      - name: Smoke Test
        run: |
          for i in {1..30}; do
            curl -sf http://$BACKEND_IP:3001/api/health && exit 0
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done
          echo "❌ Backend not ready after 60s"
          exit 1

  # ─── Production (tag v*, cần approval) ───
  deploy-production:
    name: Deploy to Production
    if: github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    environment:
      name: production
      url: http://$FRONTEND_IP:3000
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend
        run: |
          gcloud compute ssh deploy@shop-backend --zone=asia-southeast1-a \
            --command="
              docker pull $REGISTRY/techshop-backend:${{ github.ref_name }} &&
              docker rm -f backend || true &&
              docker run -d --name backend --restart always -p 3001:3001 \
                -e DATABASE_URL=\"postgresql://postgres:postgres@$DB_INTERNAL_IP:5432/shopdb?schema=public\" \
                -e JWT_SECRET=\"${{ secrets.JWT_SECRET }}\" \
                -e JWT_EXPIRES_IN=7d \
                -e PORT=3001 \
                -e NODE_ENV=production \
                -e FRONTEND_URL=http://$FRONTEND_IP:3000 \
                $REGISTRY/techshop-backend:${{ github.ref_name }}
            "

      - name: Deploy Frontend
        run: |
          gcloud compute ssh deploy@shop-frontend --zone=asia-southeast1-a \
            --command="
              docker pull $REGISTRY/techshop-frontend:${{ github.ref_name }} &&
              docker rm -f frontend || true &&
              docker run -d --name frontend --restart always -p 3000:3000 \
                $REGISTRY/techshop-frontend:${{ github.ref_name }}
            "

      - name: Smoke Test
        run: |
          for i in {1..30}; do
            curl -sf http://$BACKEND_IP:3001/api/health && exit 0
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done
          echo "❌ Backend not ready after 60s"
          exit 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
