# Deploy: Staging + Production
name: Deploy
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  # Staging
  deploy-staging:
    name: Deploy to Staging
    if: github.ref_type == 'branch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: echo "✅ Deploy staging - image ready"

  # Production (chỉ tag, cần approval)
  deploy-production:
    name: Deploy to Production
    if: github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - run: echo "🚀 Deploy production ${{ github.ref_name }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
