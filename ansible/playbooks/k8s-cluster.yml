---
# Playbook: Cài đặt Kubernetes cluster (kubeadm)
# Chạy sau khi Terraform tạo xong EC2 instances
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/k8s-cluster.yml
# ===============================================================

- name: Prepare all K8s nodes (containerd + kubeadm + kubectl + kubelet)
  hosts: k8s_cluster
  become: yes
  roles:
    - common

- name: Initialize master node (kubeadm init + Calico + upload SSM)
  hosts: master
  become: yes
  serial: 1
  roles:
    - master

- name: Join additional control-plane nodes
  hosts: workers
  become: yes
  serial: 1
  roles:
    - worker

- name: Join ingress/worker nodes
  hosts: ingress
  become: yes
  serial: 1
  roles:
    - worker

# ─── Post-deploy: untaint tất cả control-plane nodes ───
- name: Untaint all control-plane nodes (run after cluster is fully formed)
  hosts: master[0]
  become: yes
  tasks:
    - name: Remove control-plane taint from all masters
      shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: false

    - name: Taint ingress/worker nodes (chỉ ingress được schedule)
      shell: |
        kubectl taint node {{ hostvars[item]['ansible_host'] }} node-role=ingress:NoSchedule --overwrite 2>/dev/null || true
      loop: "{{ groups['ingress'] }}"
      changed_when: false
