---
# Playbook: Cài đặt Kubernetes cluster (kubeadm)
# Chạy sau khi Terraform tạo xong EC2 instances
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/k8s-cluster.yml
# ===============================================================

- name: Prepare all K8s nodes (containerd + kubeadm + kubectl + kubelet)
  hosts: k8s_cluster
  become: yes
  roles:
    - common

- name: Initialize master node (kubeadm init + Calico + upload SSM)
  hosts: master
  become: yes
  serial: 1
  roles:
    - master

- name: Join additional control-plane nodes
  hosts: workers
  become: yes
  serial: 1
  roles:
    - worker

- name: Join ingress/worker nodes
  hosts: ingress
  become: yes
  serial: 1
  roles:
    - worker

# ─── Post-deploy: untaint + cert-manager + setup PV ───
- name: Post-deploy tasks (cert-manager, PV, untaint)
  hosts: master[0]
  become: yes
  tasks:
    - name: Remove control-plane taint from all masters
      shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
      changed_when: false

    - name: Taint ingress nodes (chỉ ingress-nginx được schedule)
      shell: |
        NODE_NAME=$(kubectl get nodes -o json | \
          jq -r '.items[] | select(.status.addresses[] | select(.type=="InternalIP" and .address=="{{ hostvars[item].ansible_default_ipv4.address }}")) | .metadata.name')
        kubectl taint node $NODE_NAME role=ingress:NoSchedule --overwrite 2>/dev/null || true
        kubectl label node $NODE_NAME role=ingress --overwrite 2>/dev/null || true
        echo "Labeled $NODE_NAME as ingress"
      loop: "{{ groups['ingress'] }}"
      changed_when: false

    - name: Install cert-manager (CRDs + Helm via kubectl apply)
      shell: |
        # CRDs
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.0/cert-manager.crds.yaml
        # Install cert-manager manifest trực tiếp (ko cần helm)
        kubectl create namespace cert-manager 2>/dev/null || true && kubectl apply -n cert-manager \
          -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.0/cert-manager.yaml
        # Đợi webhook ready
        kubectl wait --for=condition=available --timeout=3m \
          -n cert-manager deployment/cert-manager-webhook
      changed_when: false

    - name: Wait for cert-manager webhook ready
      shell: |
        kubectl wait --for=condition=available --timeout=3m \
          -n cert-manager deployment/cert-manager-webhook
      changed_when: false

    - name: Install ArgoCD
      shell: |
        kubectl create namespace argocd 2>/dev/null || true
        kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        kubectl wait --for=condition=available --timeout=3m \
          -n argocd deployment/argocd-server
      changed_when: false

    - name: Get AWS region
      shell: curl -s http://169.254.169.254/latest/meta-data/placement/region
      register: aws_region
      changed_when: false

    - name: Check for available EBS volumes (10Gi) — volume cũ còn data
      shell: |
        aws ec2 describe-volumes \
          --filters "Name=status,Values=available" "Name=size,Values=10" \
          --region "{{ aws_region.stdout }}" \
          --query 'Volumes[0].VolumeId' --output text
      register: old_vol
      changed_when: false

    - name: Create PV from existing EBS volume (để StatefulSet dùng lại data)
      when: old_vol.stdout | length > 12
      shell: |
        kubectl delete pv postgres-data-old 2>/dev/null || true
        kubectl apply -f - <<EOFM
        apiVersion: v1
        kind: PersistentVolume
        metadata:
          name: postgres-data-old
        spec:
          capacity:
            storage: 10Gi
          volumeMode: Filesystem
          accessModes:
            - ReadWriteOnce
          persistentVolumeReclaimPolicy: Retain
          storageClassName: techshop-ssd-immediate
          claimRef:
            name: pgdata-postgres-0
            namespace: techshop
          awsElasticBlockStore:
            volumeID: {{ old_vol.stdout }}
            fsType: ext4
        EOFM
      changed_when: false
