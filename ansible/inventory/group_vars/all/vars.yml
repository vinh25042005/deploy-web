# Group vars: monitoring
# File: inventory/group_vars/all/vars.yml
#
# monitoring_host được truyền từ dòng lệnh:
#   ansible-playbook ... -e "monitoring_host=$(terraform -chdir=terraform output -raw public_ip)"

# ── Ports ──
prometheus_port: 9090
grafana_port: 3000
node_exporter_port: 9100

# ── Prometheus config ──
prometheus_scrape_interval: 15s
prometheus_evaluation_interval: 15s
