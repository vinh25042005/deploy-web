{{- if .Values.postgres.enabled }}
{{- if .Values.postgres.backup.enabled }}
# ── Backup CronJob: dump DB lên S3 mỗi 6h ──
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: {{ .Values.namespace }}
spec:
  schedule: "{{ .Values.postgres.backup.schedule }}"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:16-alpine
            env:
            - name: PGHOST
              value: "postgres"
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGPASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: S3_BUCKET
              value: {{ .Values.postgres.backup.s3Bucket | quote }}
            - name: AWS_REGION
              value: {{ .Values.postgres.backup.s3Region | quote }}
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache aws-cli
              FILE="backup-$(date +%Y%m%d-%H%M%S).sql.gz"
              pg_dump -h $PGHOST -U $PGUSER -d $PGDATABASE | gzip > /tmp/$FILE
              aws s3 cp /tmp/$FILE s3://$S3_BUCKET/$FILE
              echo "Backup: s3://$S3_BUCKET/$FILE"
---
# ── Init container script để restore từ S3 ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-restore
  namespace: {{ .Values.namespace }}
data:
  restore.sh: |
    #!/bin/sh
    apk add --no-cache aws-cli
    LATEST=$(aws s3 ls s3://${S3_BUCKET}/ | sort | tail -1 | awk '{print $4}')
    if [ -n "$LATEST" ]; then
      echo "Restoring from s3://${S3_BUCKET}/${LATEST}"
      aws s3 cp s3://${S3_BUCKET}/${LATEST} /tmp/restore.sql.gz
      gunzip -c /tmp/restore.sql.gz | psql
      echo "Restore complete!"
    else
      echo "No backup found, starting fresh"
    fi
{{- end }}
{{- end }}
