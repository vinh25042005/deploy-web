{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
spec:
  replicas: {{ .Values.postgres.replicas }}
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      {{- if .Values.postgres.backup.enabled }}
      initContainers:
      - name: restore-from-s3
        image: amazon/aws-cli:latest
        env:
        - name: S3_BUCKET
          value: {{ .Values.postgres.backup.s3Bucket | quote }}
        - name: AWS_REGION
          value: {{ .Values.postgres.backup.s3Region | quote }}
        command:
        - /bin/sh
        - -c
        - |
          if [ -f /var/lib/postgresql/PG_VERSION ]; then
            echo "Database exists, skipping restore"
          else
            echo "Fresh volume, checking S3..."
            LATEST=$(aws s3 ls s3://$S3_BUCKET/ | grep '.sql.gz' | sort | tail -1 | awk '{print $4}')
            if [ -n "$LATEST" ]; then
              echo "Restoring from s3://$S3_BUCKET/$LATEST"
              aws s3 cp s3://$S3_BUCKET/$LATEST /tmp/restore.sql.gz
              gunzip -c /tmp/restore.sql.gz | psql -h localhost -U {{ .Values.postgres.user }} -d {{ .Values.postgres.database }}
              echo "Restore complete!"
            else
              echo "No backup in S3, starting fresh"
            fi
          fi
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql
      {{- end }}
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.postgres.port }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
  selector:
    app: postgres
  type: ClusterIP
{{- end }}
