{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: {{ .Values.postgres.replicas }}
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      {{- if .Values.postgres.backup.enabled }}
      initContainers:
      - name: restore-from-s3
        image: postgres:16-alpine
        env:
        - name: S3_BUCKET
          value: {{ .Values.postgres.backup.s3Bucket | quote }}
        - name: AWS_REGION
          value: {{ .Values.postgres.backup.s3Region | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        command:
        - /bin/sh
        - -c
        - |
          PGDATA=/var/lib/postgresql/data
          if [ -f "$PGDATA/PG_VERSION" ]; then
            echo "Data exists, skipping restore"
            exit 0
          fi

          apk add --no-cache aws-cli > /dev/null 2>&1
          echo "Fresh volume, checking S3..."
          LATEST=$(aws s3 ls s3://$S3_BUCKET/ | grep '.sql.gz' | sort | tail -1 | awk '{print $4}')
          if [ -z "$LATEST" ]; then
            echo "No backup in S3, starting fresh"
            exit 0
          fi

          echo "Downloading $LATEST..."
          aws s3 cp s3://$S3_BUCKET/$LATEST /tmp/restore.sql.gz

          # Init DB giống hệt postgres image entrypoint
          eval "initdb --username=$POSTGRES_USER $PGDATA"
          eval "pg_ctl -D $PGDATA -l /tmp/pg.log start"
          sleep 2

          # Tạo database nếu chưa có
          psql -U "$POSTGRES_USER" -tc "SELECT 1 FROM pg_database WHERE datname='$POSTGRES_DB'" | grep -q 1 || \
            createdb -U "$POSTGRES_USER" "$POSTGRES_DB"

          # Restore
          echo "Restoring to database $POSTGRES_DB..."
          gunzip -c /tmp/restore.sql.gz | psql -U "$POSTGRES_USER" -d "$POSTGRES_DB"

          pg_ctl -D $PGDATA -l /tmp/pg.log stop
          echo "Restore complete!"
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql
      {{- end }}
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.postgres.port }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
        storageClassName: {{ .Values.postgres.storage.className }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
  selector:
    app: postgres
  type: ClusterIP
{{- end }}
