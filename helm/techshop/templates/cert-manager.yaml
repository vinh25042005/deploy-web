{{- if .Values.ingress.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: techshop-selfsigned-issuer
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: techshop-tls
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/disable-validation: "true"
spec:
  secretName: {{ .Values.ingress.tlsSecret }}
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: techshop-selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.host }}
{{- end }}
