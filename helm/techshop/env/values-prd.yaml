namespace: techshop-prd

backend:
  replicas: 3
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 512Mi }

frontend:
  replicas: 3
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 512Mi }

postgres:
  storage:
    size: 50Gi

config:
  nodeEnv: production
  frontendUrl: https://shop.example.com

hpa:
  minReplicas: 3
  maxReplicas: 10
  targetCPU: 70

ingress:
  host: shop.example.com
  tlsSecret: prod-tls

# ─── Loki + Promtail cho production ───
monitoring:
  loki:
    enabled: true
    url: http://techshop-prd-loki:3100
  promtail:
    enabled: true

promtail:
  config:
    clients:
      - url: http://techshop-prd-loki:3100/loki/api/v1/push

loki:
  extraEnv:
    - name: AWS_REGION
      value: ap-southeast-1
