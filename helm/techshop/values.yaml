namespace: techshop

images:
  backend: asia-southeast1-docker.pkg.dev/techshop-prod-2026/techshop/backend:latest
  frontend: asia-southeast1-docker.pkg.dev/techshop-prod-2026/techshop/frontend:latest
  postgres: postgres:16-alpine

backend:
  replicas: 2
  port: 3001
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

frontend:
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

postgres:
  replicas: 1
  port: 5432
  user: postgres
  password: password123
  database: shopdb
  storage:
    size: 10Gi
    className: techshop-ssd

config:
  nodeEnv: production
  jwtExpiresIn: 7d
  frontendUrl: https://8.233.56.51
  backendInternalUrl: http://backend:3001
  # Secrets below: override via env/values-secret.yaml (gitignored)
  jwtSecret: changeme
  databaseUrl: postgresql://postgres:password123@postgres:5432/shopdb?schema=public

ingress:
  host: techshop.local
  tlsSecret: techshop-tls

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 50
