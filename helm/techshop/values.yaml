namespace: techshop-dev

images:
  backend: docker.io/vinh2504/deploy-web-backend:latest
  frontend: docker.io/vinh2504/deploy-web-frontend:latest
  postgres: postgres:16-alpine

backend:
  enabled: true
  replicas: 2
  port: 3001
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

frontend:
  enabled: true
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

postgres:
  enabled: true        # Postgres in-cluster với backup S3
  replicas: 1
  port: 5432
  user: postgres
  password: password123
  database: shopdb
  storage:
    size: 10Gi
    className: techshop-ssd-immediate
  backup:
    enabled: true
    schedule: "0 */6 * * *"           # 6 giờ 1 lần
    s3Bucket: techshop-loki-790400775134
    s3Region: ap-southeast-1

config:
  nodeEnv: production
  jwtExpiresIn: 7d
  frontendUrl: http://techshop.local
  backendInternalUrl: http://backend:3001
  jwtSecret: changeme
  databaseUrl: postgresql://postgres:password123@postgres:5432/shopdb?schema=public

ingress:
  host: techshop.local
  tlsSecret: techshop-tls
  tls:
    enabled: true    # cert-manager + selfsigned ClusterIssuer

# ─── cert-manager — Ansible đã cài CRDs + Helm chart, subchart chỉ dùng fallback ───
cert-manager:
  installCRDs: false

# ─── NGINX Ingress Controller subchart ───
ingress-nginx:
  controller:
    hostNetwork: true
    kind: DaemonSet
    daemonset:
      useHostPort: true
    service:
      type: ClusterIP
    nodeSelector:
      role: ingress
    tolerations:
      - key: role
        operator: Equal
        value: ingress
        effect: NoSchedule

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 50

# ─── Storage ───
storage:
  ebsCSI:
    enabled: true

# ─── Metrics Server (cho HPA) ───
metrics-server:
  args:
    - --kubelet-insecure-tls

monitoring:
  enabled: true

  # ─── kube-prometheus-stack (Prometheus + Grafana + Alertmanager) ───
  kube-prometheus-stack:
    alertmanager:
      enabled: false

    # ─── Prometheus ───
    prometheus:
      prometheusSpec:
        retention: 7d
        retentionSize: 5GB
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits:   { cpu: 500m, memory: 1Gi }
        # Cho phép chọn ServiceMonitor từ mọi namespace
        serviceMonitorSelectorNilUsesHelmValues: false

    # ─── Grafana ───
    grafana:
      adminPassword: admin123
      service:
        type: ClusterIP
        port: 80
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
      dashboards:
        default:
          node-exporter-full:
            gnetId: 1860
            datasource: Prometheus

    # ─── Node Exporter ───
    prometheus-node-exporter:
      enabled: true

    # ─── kube-state-metrics ───
    kube-state-metrics:
      enabled: true

  # ─── Loki (log aggregation) — tắt vì OOM trên t3.medium ───
  loki:
    enabled: false

  # ─── Promtail (log collector) ───
  promtail:
    enabled: false
    resultsCache:
      enabled: false
  # ─── Resources cho SingleBinary ───
  singleBinary:
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }
  # ─── AWS credentials từ EC2 instance profile ───
  extraEnv:
    - name: AWS_REGION
      value: ap-southeast-1