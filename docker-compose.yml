# PostgreSQL + Backend + Frontend
# Copy .env.example → .env và điền giá trị thật trước khi chạy

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API 
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: shop-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: ${BACKEND_PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Next.js) — proxy /api/* sang backend qua internal network
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:3001}
    container_name: shop-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: