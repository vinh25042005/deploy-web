apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: techshop
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: password123
            - name: POSTGRES_DB
              value: shopdb
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql
          resources: {}
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
