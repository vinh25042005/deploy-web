apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techshop-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vinh25042005/deploy-web.git
    targetRevision: capstone-week5
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
