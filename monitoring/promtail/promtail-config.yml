server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://10.20.1.5:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          host: shop-monitor
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - docker: {}
